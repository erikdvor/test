<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Týmová Kasa</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Týmová Kasa">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055661.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #0f172a; margin: 0; padding: 0; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen">
  <div id="root" class="w-full h-full max-w-md bg-slate-50 relative flex flex-col font-sans sm:rounded-[2.5rem] sm:border-[8px] sm:border-slate-800 sm:shadow-2xl overflow-hidden sm:h-[800px] sm:my-10"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Počáteční data, pokud je paměť prázdná
    const initialFines = [
      { id: 1, name: 'Svatba', amount: 2000, icon: '💍' },
      { id: 2, name: 'Narozeniny', amount: 500, icon: '🎂' },
      { id: 3, name: 'Pozdní příchod', amount: 50, icon: '⏰' },
      { id: 4, name: 'Zapomenutý dres', amount: 100, icon: '👕' },
      { id: 5, name: 'Žlutá karta', amount: 200, icon: '🟨' },
      { id: 6, name: 'Červená karta', amount: 500, icon: '🟥' },
      { id: 7, name: 'Nová kopačky', amount: 300, icon: '👟' },
    ];

    const initialMembers = [
      { id: 1, name: 'Jan Novák', owed: 250, paid: 1000, debtDate: Date.now() - 86400000 * 2, photo: null, dob: null },
      { id: 2, name: 'Petr Svoboda', owed: 0, paid: 2500, debtDate: null, photo: null, dob: null },
      { id: 3, name: 'Tomáš Dvořák', owed: 2000, paid: 500, debtDate: Date.now() - 86400000 * 14, photo: null, dob: null },
      { id: 4, name: 'Lukáš Černý', owed: 100, paid: 800, debtDate: Date.now() - 3600000 * 5, photo: null, dob: null },
      { id: 5, name: 'Martin Veselý', owed: 0, paid: 1200, debtDate: null, photo: null, dob: null },
    ];

    const initialHistory = [
      { id: 101, memberId: 1, memberName: 'Jan Novák', fineName: 'Žlutá karta', amount: 200, date: 'Dnes 14:30', type: 'fine' },
      { id: 102, memberId: 3, memberName: 'Tomáš Dvořák', fineName: 'Svatba', amount: 2000, date: 'Včera 18:15', type: 'fine' },
      { id: 103, memberId: 2, memberName: 'Petr Svoboda', fineName: 'Úhrada dluhu', amount: 500, date: '20. úno', type: 'payment' },
    ];

    // Komprese fotek pro ušetření místa v localStorage
    const compressImage = (file, maxWidth) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scale = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); // Komprese JPEG 70%
          };
        };
      });
    };

    function App() {
      // --- STAVY A LOKÁLNÍ DATA ---
      const [activeTab, setActiveTab] = useState('home');
      
      const [members, setMembers] = useState(() => {
        try { const item = window.localStorage.getItem('teamKasa_members'); return item ? JSON.parse(item) : initialMembers; } 
        catch (e) { return initialMembers; }
      });
      
      const [fines, setFines] = useState(() => {
        try { const item = window.localStorage.getItem('teamKasa_fines'); return item ? JSON.parse(item) : initialFines; } 
        catch (e) { return initialFines; }
      });
      
      const [history, setHistory] = useState(() => {
        try { const item = window.localStorage.getItem('teamKasa_history'); return item ? JSON.parse(item) : initialHistory; } 
        catch (e) { return initialHistory; }
      });

      const [expenses, setExpenses] = useState(() => {
        try { const item = window.localStorage.getItem('teamKasa_expenses'); return item ? JSON.parse(item) : []; } 
        catch (e) { return []; }
      });

      const [qrCodeImage, setQrCodeImage] = useState(() => {
        try { return window.localStorage.getItem('teamKasa_qr') || null; } 
        catch (e) { return null; }
      });

      // Ukládání do localStorage při každé změně
      useEffect(() => { window.localStorage.setItem('teamKasa_members', JSON.stringify(members)); }, [members]);
      useEffect(() => { window.localStorage.setItem('teamKasa_fines', JSON.stringify(fines)); }, [fines]);
      useEffect(() => { window.localStorage.setItem('teamKasa_history', JSON.stringify(history)); }, [history]);
      useEffect(() => { window.localStorage.setItem('teamKasa_expenses', JSON.stringify(expenses)); }, [expenses]);
      useEffect(() => { 
        if (qrCodeImage) window.localStorage.setItem('teamKasa_qr', qrCodeImage);
        else window.localStorage.removeItem('teamKasa_qr');
      }, [qrCodeImage]);

      // UI Stavy pro Modaly a Filtry
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isQuickPayModalOpen, setIsQuickPayModalOpen] = useState(false);
      const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
      const [isAddMemberModalOpen, setIsAddMemberModalOpen] = useState(false);
      const [isAddFineItemModalOpen, setIsAddFineItemModalOpen] = useState(false);
      const [isRemoveMemberModalOpen, setIsRemoveMemberModalOpen] = useState(false);
      const [isRemoveFineItemModalOpen, setIsRemoveFineItemModalOpen] = useState(false);
      
      const [confirmUndoItem, setConfirmUndoItem] = useState(null);
      const [selectedMember, setSelectedMember] = useState(null);
      const [membersFilter, setMembersFilter] = useState('all');

      const [payingMember, setPayingMember] = useState(null);
      const [payAmount, setPayAmount] = useState(0);

      const [expenseName, setExpenseName] = useState('');
      const [expenseAmount, setExpenseAmount] = useState('');
      
      const [newMemberName, setNewMemberName] = useState('');
      const [newMemberDob, setNewMemberDob] = useState('');
      const [newMemberPhoto, setNewMemberPhoto] = useState(null);

      const [newFineName, setNewFineName] = useState('');
      const [newFineAmount, setNewFineAmount] = useState('');
      const [newFineIcon, setNewFineIcon] = useState('⚽');

      const [flipCount, setFlipCount] = useState(0);
      const sideAIndex = Math.floor(flipCount / 2) * 2;
      const sideBIndex = flipCount === 0 ? 1 : Math.floor((flipCount - 1) / 2) * 2 + 1;

      // --- POMOCNÉ FUNKCE ---
      const formatDebtAge = (timestamp) => {
        if (!timestamp) return '';
        const diffDays = Math.floor((Date.now() - timestamp) / (1000 * 60 * 60 * 24));
        if (diffDays === 0) return 'Dnes';
        if (diffDays === 1) return 'Včera';
        return `Před ${diffDays} dny`;
      };

      const totalCollected = members.reduce((sum, m) => sum + m.paid, 0); 
      const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0); 
      const totalInBank = totalCollected - totalExpenses; 
      const totalOwed = members.reduce((sum, m) => sum + m.owed, 0); 
      const totalExpected = totalCollected + totalOwed; 
      const collectionRate = totalExpected > 0 ? Math.round((totalCollected / totalExpected) * 100) : 0;
      
      const topPaidMembers = [...members].sort((a, b) => b.paid - a.paid);
      const maxChartValue = Math.max(totalCollected, totalExpenses, totalOwed, 1);

      // --- HLAVNÍ AKCE ---
      const handleAddFine = (memberId, fine) => {
        setMembers(members.map(m => {
          if (m.id === memberId) return { ...m, owed: m.owed + fine.amount, debtDate: m.owed === 0 ? Date.now() : m.debtDate };
          return m;
        }));
        const member = members.find(m => m.id === memberId);
        setHistory([{ id: Date.now(), memberId: member.id, memberName: member.name, fineName: fine.name, amount: fine.amount, date: 'Právě teď', type: 'fine' }, ...history]);
        setIsAddModalOpen(false);
        setSelectedMember(null);
      };

      const openPayModal = (member) => {
        setPayingMember(member);
        setPayAmount(member.owed);
      };

      const confirmPayment = () => {
        if (!payingMember || payAmount <= 0) return;
        setMembers(members.map(m => {
          if (m.id === payingMember.id) {
            const newOwed = m.owed - payAmount;
            return { ...m, paid: m.paid + payAmount, owed: newOwed, debtDate: newOwed === 0 ? null : m.debtDate };
          }
          return m;
        }));
        setHistory([{ id: Date.now(), memberId: payingMember.id, memberName: payingMember.name, fineName: payAmount === payingMember.owed ? 'Úhrada dluhu' : 'Částečná úhrada', amount: payAmount, date: 'Právě teď', type: 'payment' }, ...history]);
        setPayingMember(null);
      };

      const handleAddExpense = (e) => {
        e.preventDefault();
        const amount = Number(expenseAmount);
        if (!expenseName || amount <= 0) return;
        setExpenses([{ id: Date.now(), name: expenseName, amount: amount, date: new Date().toISOString() }, ...expenses]);
        setHistory([{ id: Date.now() + 1, memberId: 'team', memberName: 'Výdaj z kasy', fineName: expenseName, amount: amount, date: 'Právě teď', type: 'expense' }, ...history]);
        setIsExpenseModalOpen(false);
        setExpenseName('');
        setExpenseAmount('');
      };

      const handleAddMember = async (e) => {
        e.preventDefault();
        if (!newMemberName.trim()) return;
        
        let compressedPhoto = null;
        if (newMemberPhoto) {
          compressedPhoto = await compressImage(newMemberPhoto, 150); // Zmenšení fotky na 150px
        }

        const newMember = {
          id: Date.now(), name: newMemberName.trim(), owed: 0, paid: 0, debtDate: null, dob: newMemberDob || null, photo: compressedPhoto
        };
        setMembers([...members, newMember]);
        setIsAddMemberModalOpen(false);
        setNewMemberName(''); setNewMemberDob(''); setNewMemberPhoto(null);
      };

      const handleAddFineItem = (e) => {
        e.preventDefault();
        const amount = Number(newFineAmount);
        if (!newFineName.trim() || amount <= 0) return;
        const newFine = { id: Date.now(), name: newFineName.trim(), amount: amount, icon: newFineIcon };
        setFines([...fines, newFine]);
        setIsAddFineItemModalOpen(false);
        setNewFineName(''); setNewFineAmount(''); setNewFineIcon('⚽');
      };

      const handleQrUpload = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const compressed = await compressImage(file, 400); // Komprese QR kódu
          setQrCodeImage(compressed);
        }
      };

      const handleMemberPhotoUploadLocal = (e) => {
        const file = e.target.files[0];
        if (file) setNewMemberPhoto(file);
      };

      // --- NOVÉ FUNKCE: MAZÁNÍ A ZRUŠENÍ (UNDO) ---
      
      const handleDeleteMember = (memberId) => {
        setMembers(members.filter(m => m.id !== memberId));
      };

      const handleDeleteFineItem = (fineId) => {
        setFines(fines.filter(f => f.id !== fineId));
      };

      const handleUndoHistory = (itemToUndo) => {
        setHistory(history.filter(h => h.id !== itemToUndo.id));

        if (itemToUndo.type === 'fine') {
          setMembers(members.map(m => {
            if (m.id === itemToUndo.memberId) {
              const newOwed = Math.max(0, m.owed - itemToUndo.amount);
              return { ...m, owed: newOwed, debtDate: newOwed === 0 ? null : m.debtDate };
            }
            return m;
          }));
        } else if (itemToUndo.type === 'payment') {
          setMembers(members.map(m => {
            if (m.id === itemToUndo.memberId) {
              return { 
                ...m, 
                paid: Math.max(0, m.paid - itemToUndo.amount), 
                owed: m.owed + itemToUndo.amount, 
                debtDate: m.debtDate || Date.now() 
              };
            }
            return m;
          }));
        } else if (itemToUndo.type === 'expense') {
          const expIndex = expenses.findIndex(e => e.name === itemToUndo.fineName && e.amount === itemToUndo.amount);
          if (expIndex !== -1) {
            const newExp = [...expenses];
            newExp.splice(expIndex, 1);
            setExpenses(newExp);
          }
        }
      };

      // --- RENDEROVÁNÍ OTOČNÉ KARTY ---
      const renderCardFace = (index) => {
        const stateIndex = index % 3;

        // TVÁŘ 0: Zůstatek
        if (stateIndex === 0) {
          return (
            <div className="w-full h-full bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl shadow-blue-200/50 flex flex-col justify-between">
              <div className="absolute top-5 right-5 text-white/40"><i className="fas fa-sync-alt"></i></div>
              <div>
                <div className="flex items-center space-x-2 opacity-80 mb-1">
                  <i className="fas fa-money-bill-wave"></i><span className="font-medium text-sm">Aktuálně v kase</span>
                </div>
                <div className="text-4xl font-black tracking-tight mb-3">{totalInBank.toLocaleString('cs-CZ')} Kč</div>
              </div>
              <div className="bg-white/10 rounded-2xl p-3 flex justify-between items-center backdrop-blur-sm border border-white/10 mb-2">
                <div><div className="text-blue-100 text-xs font-medium mb-1">Tým aktuálně dluží</div><div className="text-xl font-bold">{totalOwed.toLocaleString('cs-CZ')} Kč</div></div>
                <div className="h-10 w-10 bg-red-400/20 rounded-full flex items-center justify-center text-red-200"><i className="fas fa-exclamation-triangle"></i></div>
              </div>
              <div>
                <div className="flex justify-between text-xs font-medium text-blue-100 mb-2"><span>Úspěšnost výběru</span><span className="font-bold text-white">{collectionRate} %</span></div>
                <div className="w-full bg-black/20 rounded-full h-2"><div className="bg-green-400 h-2 rounded-full transition-all duration-1000" style={{ width: `${collectionRate}%` }}></div></div>
                <div className="flex justify-between text-[10px] text-blue-200/70 mt-1"><span>Vybráno: {totalCollected.toLocaleString('cs-CZ')}</span><span>Cíl: {totalExpected.toLocaleString('cs-CZ')} Kč</span></div>
              </div>
            </div>
          );
        }

        // TVÁŘ 1: QR Kód
        if (stateIndex === 1) {
          return (
            <div className="w-full h-full bg-white rounded-3xl p-5 shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col items-center justify-center relative">
              <div className="absolute top-5 right-5 text-slate-300"><i className="fas fa-sync-alt"></i></div>
              {qrCodeImage ? (
                <div className="flex flex-col items-center justify-center h-full w-full">
                  <h3 className="font-bold text-slate-800 text-sm mb-1 absolute top-5 left-6">Platba QR kódem</h3>
                  <img src={qrCodeImage} alt="QR" className="h-[130px] object-contain mb-3 mt-4" />
                  <div className="flex gap-2 w-full px-1">
                     <label className="flex-1 bg-slate-50 text-slate-600 font-bold py-2.5 rounded-xl text-xs text-center cursor-pointer border border-slate-100 hover:bg-slate-100 transition" onClick={e => e.stopPropagation()}>
                       <i className="fas fa-sync-alt mr-1"></i> Změnit<input type="file" className="hidden" accept="image/*" onChange={handleQrUpload} />
                     </label>
                     <button onClick={(e) => { e.stopPropagation(); setQrCodeImage(null); }} className="flex-1 bg-red-50 text-red-500 font-bold py-2.5 rounded-xl text-xs border border-red-100 hover:bg-red-100 transition">
                       <i className="fas fa-trash mr-1"></i> Smazat
                     </button>
                  </div>
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center text-center px-2 w-full h-full">
                   <div className="w-14 h-14 bg-purple-100 text-purple-500 rounded-full flex items-center justify-center mb-3"><i className="fas fa-qrcode text-2xl"></i></div>
                   <p className="text-sm font-bold text-slate-700 mb-1">QR kód banky</p>
                   <p className="text-[11px] text-slate-500 mb-4 px-2">Nahraj obrázek s QR kódem ze svého bankovnictví.</p>
                   <label className="bg-purple-600 text-white font-bold py-2.5 px-6 rounded-xl text-xs cursor-pointer shadow-md shadow-purple-200 hover:bg-purple-700 transition w-full" onClick={e => e.stopPropagation()}>
                     <i className="fas fa-upload mr-1"></i> Nahrát QR kód<input type="file" className="hidden" accept="image/*" onChange={handleQrUpload} />
                   </label>
                </div>
              )}
            </div>
          );
        }

        // TVÁŘ 2: Graf
        if (stateIndex === 2) {
          return (
            <div className="w-full h-full bg-white rounded-3xl p-6 shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col">
              <div className="absolute top-5 right-5 text-slate-300"><i className="fas fa-sync-alt"></i></div>
              <h3 className="font-bold text-slate-800 text-lg mb-1">Přehled financí</h3>
              <div className="flex-1 mt-1 flex justify-around items-end border-b border-slate-100 pb-2">
                <div className="flex flex-col items-center w-1/3 h-full justify-end"><span className="text-[10px] sm:text-xs font-bold text-slate-500 mb-1">{totalCollected.toLocaleString('cs-CZ')}</span><div className="w-8 sm:w-10 bg-green-400 rounded-t-lg shadow-sm" style={{ height: `${(totalCollected / maxChartValue) * 100}%`, minHeight: '4px' }}></div></div>
                <div className="flex flex-col items-center w-1/3 h-full justify-end"><span className="text-[10px] sm:text-xs font-bold text-slate-500 mb-1">{totalExpenses.toLocaleString('cs-CZ')}</span><div className="w-8 sm:w-10 bg-orange-400 rounded-t-lg shadow-sm" style={{ height: `${(totalExpenses / maxChartValue) * 100}%`, minHeight: '4px' }}></div></div>
                <div className="flex flex-col items-center w-1/3 h-full justify-end"><span className="text-[10px] sm:text-xs font-bold text-slate-500 mb-1">{totalOwed.toLocaleString('cs-CZ')}</span><div className="w-8 sm:w-10 bg-red-400 rounded-t-lg shadow-sm" style={{ height: `${(totalOwed / maxChartValue) * 100}%`, minHeight: '4px' }}></div></div>
              </div>
              <div className="flex justify-around items-center pt-3">
                <span className="text-[10px] font-bold text-green-600 uppercase">Příjmy</span><span className="text-[10px] font-bold text-orange-500 uppercase">Výdaje</span><span className="text-[10px] font-bold text-red-500 uppercase">Dluhy</span>
              </div>
            </div>
          );
        }
      };

      // --- KOMPONENTY MODALŮ ---
      const AddFineModal = () => (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center transition-opacity animate-in fade-in duration-200">
          <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl h-[80vh] sm:h-[600px] flex flex-col shadow-2xl">
            <div className="flex justify-between items-center p-5 border-b border-gray-100">
              <h2 className="text-xl font-bold text-slate-800">{selectedMember ? `Pokuta pro: ${selectedMember.name}` : 'Nová pokuta'}</h2>
              <button onClick={() => { setIsAddModalOpen(false); setSelectedMember(null); }} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200 transition"><i className="fas fa-times"></i></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 bg-slate-50 no-scrollbar">
              {!selectedMember ? (
                <div>
                  <p className="text-sm text-slate-500 mb-3 font-medium px-1">1. Vyber hříšníka</p>
                  <div className="space-y-2">
                    {members.map(m => (
                      <button key={m.id} onClick={() => setSelectedMember(m)} className="w-full flex items-center p-3 bg-white rounded-xl shadow-sm border border-slate-100 active:bg-blue-50 text-left transition">
                        {m.photo ? <img src={m.photo} className="w-10 h-10 rounded-full object-cover mr-3 border border-slate-100" /> : <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3">{m.name.split(' ').map(n=>n[0]).join('').substring(0,2)}</div>}
                        <span className="font-semibold text-slate-700">{m.name}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div>
                  <p className="text-sm text-slate-500 mb-3 font-medium px-1">2. Vyber pokutu</p>
                  <div className="grid grid-cols-2 gap-3">
                    {fines.map(fine => (
                      <button key={fine.id} onClick={() => handleAddFine(selectedMember.id, fine)} className="flex flex-col items-center justify-center p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-blue-300 active:scale-95 transition">
                        <span className="text-3xl mb-2">{fine.icon}</span><span className="font-medium text-slate-700 text-sm text-center line-clamp-1">{fine.name}</span><span className="text-blue-600 font-bold mt-1">{fine.amount} Kč</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      const QuickPayModal = () => (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center transition-opacity animate-in fade-in duration-200">
          <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl h-[60vh] sm:h-[500px] flex flex-col shadow-2xl">
            <div className="flex justify-between items-center p-5 border-b border-gray-100">
              <h2 className="text-xl font-bold text-slate-800">Kdo jde platit?</h2>
              <button onClick={() => setIsQuickPayModalOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200 transition"><i className="fas fa-times"></i></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 bg-slate-50 no-scrollbar space-y-2">
              {members.filter(m => m.owed > 0).map(m => (
                <button key={m.id} onClick={() => { setIsQuickPayModalOpen(false); openPayModal(m); }} className="w-full flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border border-slate-100 active:bg-green-50 transition group">
                  <div className="flex items-center">
                    {m.photo ? <img src={m.photo} className="w-10 h-10 rounded-full object-cover mr-3"/> : <div className="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold mr-3">{m.name.split(' ').map(n=>n[0]).join('').substring(0,2)}</div>}
